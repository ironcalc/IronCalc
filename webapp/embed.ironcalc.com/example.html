<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IronCalc Embed Example</title>

    <style>
      body {
              margin: 0;
              padding: 40px;
              background: #f5f5f5;
            }

            .container {
              max-width: 900px;
              margin: 0 auto;
            }

            .embed-box {
              background: white;
              padding: 16px;
              border-radius: 12px;
              box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            }
    </style>

    <!-- In your blog: load the embed script -->
    <script src="https://embed.ironcalc.com/embed.js"></script>

    <!-- For local testing: -->
    <!-- <script src="http://localhost:8000/dist/embed.js"></script> -->
  </head>

  <body>
    <div class="container">
      <h1>IronCalc Embed Demo</h1>

      <div class="embed-box">
        <div id="sheet"></div>
      </div>
    </div>

    <script>
      async function main() {
              const response = await fetch("example.ic");
              const workbookBytes = await response.arrayBuffer();

              IronCalcEmbed.mount("#sheet", {
                style: {
                  width: "100%",
                  height: "600px",
                  border: "1px solid #e5e5e5",
                  borderRadius: "8px",
                },
                workbookBytes,
                // In a real blog, leave out the `src`
                // src: "http://localhost:5173/index.html",
              });
            }

            main();
    </script>
  </body>
</html>
