name: Build and Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "latest"
          cache: "npm"
          cache-dependency-path: |
            **/package-lock.json
      - name: Install node dependencies
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          npm install -g typescript
      - name: Lint
        run: make lint
  test-rust:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Rust Tests
        run: make test-rust
  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "latest"
          cache: "npm"
          cache-dependency-path: |
            **/package-lock.json
      - name: Install node dependencies
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          npm install -g typescript
      - name: JS Tests
        run: make test-js
      - name: Build webapp/IronCalc
        run: |
          cd webapp/IronCalc
          npm run build
      - name: Install app.ironcalc.com/frontend dependencies
        run: |
          cd webapp/app.ironcalc.com/frontend
          npm install
      - name: Install Playwright browsers
        run: |
          cd webapp/IronCalc
          npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        run: |
          cd webapp/IronCalc
          npm run test:e2e
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: webapp/IronCalc/playwright-report/
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Python Tests
        run: make test-python
